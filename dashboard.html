<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Online Price Intelligence</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard-header">
<h2>Welcome, <span id="usernameDisplay">User</span>!</h2>
<button id="logoutBtn" class="btn-small">Logout</button>
</div>

<div class="dashboard-content">

<h3>Upload Product Image</h3>

<div class="upload-area" id="uploadArea">

<input type="file" id="fileInput" accept="image/*" hidden>

<div id="uploadText">
Drag & Drop Image Here<br>or click to browse
</div>

<img id="imagePreview"
style="display:none;max-width:250px;margin-top:10px;border-radius:8px;">

</div>

<button id="uploadBtn" class="btn" style="margin-top:20px;display:none;">
Upload to Server
</button>

<!-- IMAGE DISPLAY -->
<div style="margin-top:30px;text-align:center;">
<img id="uploadedImageDisplay"
style="max-width:300px;border-radius:8px;display:none;">
</div>

<!-- PRICE RESULTS -->
<h3 style="margin-top:40px;">Price Comparison</h3>

<div id="priceResults"
style="margin-top:20px;padding:15px;background:#fff;border-radius:8px;">
Upload an image to see prices.
</div>

</div>

<script src="script.js"></script>

</body>
</html>
